{% extends "base.html" %}
{% block title %}Login · Jobvago{% endblock %}
{% block content %}
<div class="mx-auto flex min-h-[calc(100vh-12rem)] max-w-md items-center px-4 py-12">
  <div class="reveal w-full">
    <div class="mb-7 text-center">
      <h1 class="font-display text-3xl font-extrabold tracking-tight">Welcome back</h1>
      <p class="mt-2 text-sm text-base-content/60">Access your personalized career dashboard</p>
    </div>

    <div class="card border border-base-300 bg-base-100 shadow-xl">
      <div class="card-body gap-4">
        <form method="POST" class="flex flex-col gap-4">
          <label class="form-control w-full">
            <span class="label-text mb-1 font-semibold">Email address</span>
            <input type="email" name="email" required autofocus
                   class="input input-bordered w-full focus:input-primary" placeholder="you@example.com">
          </label>

          <label class="form-control w-full">
            <span class="label-text mb-1 font-semibold">Password</span>
            <input type="password" name="password" required
                   class="input input-bordered w-full focus:input-primary" placeholder="••••••••">
          </label>

          <label class="flex cursor-pointer items-center gap-2 text-sm">
            <input type="checkbox" name="remember" class="checkbox checkbox-sm checkbox-primary">
            <span>Remember me</span>
          </label>

          <button type="submit" class="btn btn-primary w-full font-semibold shadow-sm">Login</button>
        </form>
      </div>
    </div>

    <p class="mt-6 text-center text-sm text-base-content/60">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="link link-primary font-semibold">Sign up here</a>
    </p>
  </div>
</div>
{% endblock %}

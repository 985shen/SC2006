{% extends "base.html" %}
{% block title %}Register · Jobvago{% endblock %}
{% block content %}
<div class="mx-auto flex min-h-[calc(100vh-12rem)] max-w-md items-center px-4 py-12">
  <div class="reveal w-full">
    <div class="mb-7 text-center">
      <h1 class="font-display text-3xl font-extrabold tracking-tight">Create your account</h1>
      <p class="mt-2 text-sm text-base-content/60">Start your career journey today</p>
    </div>

    <div class="card border border-base-300 bg-base-100 shadow-xl">
      <div class="card-body gap-4">
        <form method="POST" class="flex flex-col gap-4">
          <label class="form-control w-full">
            <span class="label-text mb-1 font-semibold">Full name</span>
            <input type="text" name="full_name" required autofocus
                   class="input input-bordered w-full focus:input-primary" placeholder="Jane Tan">
          </label>

          <label class="form-control w-full">
            <span class="label-text mb-1 font-semibold">Email address</span>
            <input type="email" name="email" required
                   class="input input-bordered w-full focus:input-primary" placeholder="you@example.com">
          </label>

          <label class="form-control w-full">
            <span class="label-text mb-1 font-semibold">Password</span>
            <input type="password" name="password" required minlength="6"
                   class="input input-bordered w-full focus:input-primary" placeholder="At least 6 characters">
            <span class="mt-1 text-xs text-base-content/50">At least 6 characters</span>
          </label>

          <label class="form-control w-full">
            <span class="label-text mb-1 font-semibold">Confirm password</span>
            <input type="password" name="confirm_password" required
                   class="input input-bordered w-full focus:input-primary" placeholder="Re-enter password">
          </label>

          <button type="submit" class="btn btn-primary w-full font-semibold shadow-sm">Create account</button>
        </form>
      </div>
    </div>

    <p class="mt-6 text-center text-sm text-base-content/60">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="link link-primary font-semibold">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
